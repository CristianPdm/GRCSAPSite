# Configuracion de ejemplo para Nginx como proxy reverso delante de
# Gunicorn (que solo escucha en 127.0.0.1:8000, no expuesto a internet).
#
# Instalar en /etc/nginx/sites-available/grc-simpa y habilitar con:
#   sudo ln -s /etc/nginx/sites-available/grc-simpa /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ajustar "server_name" por el dominio o IP real del servidor.

server {
    listen 80;
    server_name grc-simpa.simpa.local;

    client_max_body_size 20M;  # los Excel de SAP pueden pesar varios MB

    location /static/ {
        alias /opt/grc-simpa/static/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Para HTTPS, lo mas simple es correr Certbot despues de que este bloque
# funcione por HTTP (el lo adapta automaticamente):
#   sudo certbot --nginx -d grc-simpa.simpa.local
